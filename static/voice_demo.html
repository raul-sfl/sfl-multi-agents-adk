<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stayforlong · Voice Chat Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f7;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  color: #1d1d1f;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  color: #f60e5f;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 13px;
  color: #6e6e73;
  margin-bottom: 24px;
}
.chat-box {
  width: 100%;
  max-width: 560px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 70vh;
  max-height: 600px;
}
.chat-header {
  background: linear-gradient(135deg, #c40a4c, #f60e5f);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: background 0.3s;
}
.status-dot.connected { background: #4ade80; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
.msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  animation: fadein 0.2s ease;
}
@keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }
.msg-label {
  font-size: 10px;
  color: #f60e5f;
  font-weight: 700;
  margin-bottom: 3px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 4px;
}
.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: #f60e5f;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.agent .bubble {
  background: #f0f4f8;
  color: #1d1d1f;
  border-bottom-left-radius: 4px;
}
.msg.transcript .bubble {
  background: #fff3cd;
  color: #856404;
  border-bottom-right-radius: 4px;
  font-style: italic;
  font-size: 12px;
}
#typing {
  align-self: flex-start;
  background: #f0f4f8;
  padding: 10px 16px;
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  display: none;
  gap: 5px;
  align-items: center;
}
#typing.visible { display: flex; }
#typing span {
  width: 6px; height: 6px;
  background: #999;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
#typing span:nth-child(2) { animation-delay: 0.2s; }
#typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}
.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-top: 1px solid #e8ecf0;
  background: #fff;
  flex-shrink: 0;
}
#text-input {
  flex: 1;
  border: 1px solid #d0d7df;
  border-radius: 22px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
#text-input:focus { border-color: #f60e5f; }
.btn-send {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #f60e5f;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.15s;
}
.btn-send:hover { background: #c40a4c; transform: scale(1.05); }
.btn-send svg { width: 18px; height: 18px; fill: #fff; }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Mic button */
.btn-mic {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #e8e8ed;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.btn-mic:hover { background: #d2d2d7; }
.btn-mic.recording {
  background: #fee2e2;
  border-color: #f60e5f;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(246,14,95,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(246,14,95,0); }
}
.btn-mic svg { width: 20px; height: 20px; }
.btn-mic.recording svg { fill: #f60e5f; }
.btn-mic:not(.recording) svg { fill: #6e6e73; }

/* Connection config */
.config-row {
  width: 100%;
  max-width: 560px;
  margin-bottom: 14px;
  display: flex;
  gap: 8px;
}
.config-row input {
  flex: 1;
  padding: 9px 14px;
  border: 1px solid #d0d7df;
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.config-row input:focus { border-color: #f60e5f; }
.config-row select {
  padding: 9px 10px;
  border: 1px solid #d0d7df;
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  background: #fff;
  cursor: pointer;
}
.btn-connect {
  padding: 9px 18px;
  background: #f60e5f;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.btn-connect:hover { background: #c40a4c; }
#status-msg {
  font-size: 12px;
  color: #6e6e73;
  margin-bottom: 10px;
  min-height: 16px;
}
#status-msg.err { color: #e63946; }

.hint {
  font-size: 11px;
  color: #9e9e9e;
  margin-top: 10px;
  text-align: center;
}

/* Voice feedback strip — sits between messages and input, never scrolls away */
#voice-feedback {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 8px 14px;
  border-top: 1px solid #f0e6ec;
  background: #fdf5f8;
  flex-shrink: 0;
}
#voice-feedback.active { display: flex; }

/* Live interim transcript */
#interim-bubble {
  display: none;
  flex-direction: column;
  align-items: flex-end;
  animation: fadein 0.15s ease;
}
#interim-bubble.active { display: flex; }
#interim-bubble .msg-label { font-size:10px; color:#f60e5f; font-weight:700; margin-bottom:2px; text-transform:uppercase; }
#interim-bubble .bubble {
  background: #fce7f3;
  color: #9d174d;
  border-bottom-right-radius: 4px;
  font-style: italic;
  opacity: 0.9;
  max-width: 100%;
}

/* Audio playing indicator */
#audio-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #2e7d32;
  font-weight: 600;
}
#audio-indicator.active { display: flex; }
#audio-indicator .bars { display:flex; gap:3px; align-items:center; height:14px; }
#audio-indicator .bars span {
  width: 3px; background: #4caf50; border-radius: 2px;
  animation: audiobar 0.7s ease-in-out infinite alternate;
}
#audio-indicator .bars span:nth-child(2) { animation-delay:0.15s; }
#audio-indicator .bars span:nth-child(3) { animation-delay:0.3s; }
#audio-indicator .bars span:nth-child(4) { animation-delay:0.15s; }
@keyframes audiobar { from{height:3px} to{height:14px} }
</style>
</head>
<body>

<h1>Stayforlong Voice Demo</h1>
<p class="subtitle">Talk to the AI assistant — hold the mic button to record</p>
<p id="status-msg"></p>

<div class="config-row">
  <input id="ws-url" type="text" placeholder="WebSocket URL" value="" />
  <select id="lang-select">
    <option value="es">ES</option>
    <option value="en" selected>EN</option>
    <option value="fr">FR</option>
    <option value="de">DE</option>
    <option value="it">IT</option>
    <option value="pt">PT</option>
    <option value="ca">CA</option>
  </select>
  <button class="btn-connect" id="btn-connect" onclick="toggleConnect()">Connect</button>
</div>

<div class="chat-box">
  <div class="chat-header">
    <div class="status-dot" id="status-dot"></div>
    <span>Stayforlong Assistant</span>
    <span id="agent-label" style="opacity:.7;font-weight:400;font-size:12px;margin-left:auto"></span>
  </div>
  <div class="messages" id="messages">
    <div id="typing"><span></span><span></span><span></span></div>
  </div>
  <div id="voice-feedback">
    <div id="interim-bubble"><div class="msg-label">🎤 You</div><div class="bubble" id="interim-text"></div></div>
    <div id="audio-indicator"><div class="bars"><span></span><span></span><span></span><span></span></div>&nbsp;🔊 Speaking…</div>
  </div>
  <div class="input-row">
    <input id="text-input" type="text" placeholder="Type a message…" onkeydown="onTextKey(event)" />
    <button class="btn-mic" id="btn-mic"
      onmousedown="startRecording()" onmouseup="stopRecording()"
      ontouchstart="startRecording(event)" ontouchend="stopRecording(event)"
      title="Hold to record">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93A8 8 0 0 1 4.07 12H6a6 6 0 0 0 12 0h1.93A8 8 0 0 1 13 18.93V21h2v2H9v-2h2v-2.07z"/>
      </svg>
    </button>
    <button class="btn-send" id="btn-send" onclick="sendText()" title="Send text">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<p class="hint">Mic: hold to record, release to send &nbsp;|&nbsp; Also supports typed text messages</p>

<script>
(function () {
  'use strict';

  // ── DOM refs ──────────────────────────────────────────────────────────────
  var wsUrlInput    = document.getElementById('ws-url');
  var langSelect    = document.getElementById('lang-select');
  var statusMsg     = document.getElementById('status-msg');
  var statusDot     = document.getElementById('status-dot');
  var agentLabel    = document.getElementById('agent-label');
  var interimBubble = document.getElementById('interim-bubble');
  var interimText   = document.getElementById('interim-text');
  var audioIndicator= document.getElementById('audio-indicator');

  // Default URL based on hostname
  var defaultHost = location.hostname;
  var isLocal = !defaultHost || defaultHost === 'localhost' || defaultHost === '127.0.0.1';
  wsUrlInput.value = isLocal
    ? 'ws://localhost:8000/ws/voice'
    : 'wss://' + defaultHost + '/ws/voice';

  // Detect browser language
  var browserLang = (navigator.language || 'en').split('-')[0].toLowerCase();
  var opts = langSelect.options;
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].value === browserLang) { langSelect.selectedIndex = i; break; }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  var ws = null;
  var userId = _getUserId();
  var connected = false;
  var mediaRecorder = null;
  var audioChunks = [];
  var isRecording = false;

  // Live transcript (SpeechRecognition)
  var liveRecog = null;

  // Audio playback queue (sequential, gapless)
  var audioCtx = null;
  var audioQueue = [];       // { seq, buffer } objects
  var nextSeq = 0;
  var isPlayingChain = false;

  // ── User ID persistence ──────────────────────────────────────────────────
  function _getUserId() {
    var KEY = 'sfl_voice_demo_user_id';
    try {
      var stored = localStorage.getItem(KEY);
      if (stored) return stored;
      var id = 'demo_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8);
      localStorage.setItem(KEY, id);
      return id;
    } catch (e) {
      return 'demo_' + Math.random().toString(36).substr(2, 12);
    }
  }

  // ── Connect / disconnect ──────────────────────────────────────────────────
  function toggleConnect() {
    if (connected) {
      disconnect();
    } else {
      connect();
    }
  }

  function connect() {
    var lang    = langSelect.value;
    var baseUrl = wsUrlInput.value.trim();
    if (!baseUrl) { setStatus('Enter a WebSocket URL.', true); return; }

    var url = baseUrl + '?lang=' + lang + '&user_id=' + encodeURIComponent(userId);
    setStatus('Connecting…');

    ws = new WebSocket(url);

    ws.onopen = function () {
      connected = true;
      statusDot.classList.add('connected');
      document.getElementById('btn-connect').textContent = 'Disconnect';
      setStatus('Connected — hold mic to speak or type a message.');
    };

    ws.onmessage = function (evt) {
      var data;
      try { data = JSON.parse(evt.data); } catch (e) { return; }
      handleMessage(data);
    };

    ws.onclose = function () {
      connected = false;
      statusDot.classList.remove('connected');
      document.getElementById('btn-connect').textContent = 'Connect';
      setStatus('Disconnected.');
    };

    ws.onerror = function () {
      setStatus('Connection error.', true);
    };
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null; }
  }

  // ── Handle server messages ────────────────────────────────────────────────
  function handleMessage(data) {
    switch (data.type) {
      case 'ping':
        break;

      case 'session_init':
        agentLabel.textContent = 'Session ready';
        break;

      case 'transcript':
        hideTyping();
        interimBubble.classList.remove('active');
        interimText.textContent = '';
        if (data.text) {
          appendMsg('user', data.text, null, 'voice');
          setStatus('Thinking…');
        } else if (data.error) {
          setStatus(data.error, true);
        }
        break;

      case 'typing':
        showTyping(data.agent);
        agentLabel.textContent = (data.agent || '') + '…';
        break;

      case 'audio_chunk':
        hideTyping();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        _enqueueAudioChunk(data.audio_b64, data.seq);
        break;

      case 'message':
        hideTyping();
        agentLabel.textContent = data.agent || 'Assistant';
        appendMsg('agent', data.content, data.agent, 'text');
        break;

      case 'audio_done':
        setStatus('');
        break;

      case 'error':
        hideTyping();
        setStatus(data.content || 'An error occurred.', true);
        appendMsg('agent', data.content || 'An error occurred.', null, 'text');
        break;
    }
  }

  // ── Audio queue (gapless sequential playback) ─────────────────────────────
  function _getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function _enqueueAudioChunk(b64, seq) {
    var bytes = _b64ToArrayBuffer(b64);
    _getAudioCtx().decodeAudioData(bytes, function (buffer) {
      audioQueue.push({ seq: seq, buffer: buffer });
      audioQueue.sort(function (a, b) { return a.seq - b.seq; });
      if (!isPlayingChain) _playNext();
    }, function (err) {
      console.warn('Audio decode error:', err);
    });
  }

  function _showFeedback() { document.getElementById('voice-feedback').classList.add('active'); }
  function _hideFeedback() { document.getElementById('voice-feedback').classList.remove('active'); }

  function _playNext() {
    if (audioQueue.length === 0) {
      isPlayingChain = false;
      audioIndicator.classList.remove('active');
      _hideFeedback();
      return;
    }
    var item = audioQueue[0];
    if (item.seq !== nextSeq) {
      isPlayingChain = false;
      return;
    }
    audioQueue.shift();
    nextSeq++;
    isPlayingChain = true;
    audioIndicator.classList.add('active');
    _showFeedback();

    var ctx = _getAudioCtx();
    var source = ctx.createBufferSource();
    source.buffer = item.buffer;
    source.connect(ctx.destination);
    source.onended = _playNext;
    source.start(0);
  }

  function _b64ToArrayBuffer(b64) {
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }

  function _resetAudioQueue() {
    audioQueue = [];
    nextSeq = 0;
    isPlayingChain = false;
    audioIndicator.classList.remove('active');
    _hideFeedback();
  }

  // ── Live interim transcript (SpeechRecognition) ───────────────────────────
  function _startLiveTranscript(lang) {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    liveRecog = new SR();
    liveRecog.lang = lang;
    liveRecog.interimResults = true;
    liveRecog.continuous = true;
    liveRecog.onresult = function (e) {
      var interim = '';
      for (var i = e.resultIndex; i < e.results.length; i++) {
        if (!e.results[i].isFinal) interim += e.results[i][0].transcript;
      }
      if (interim) {
        interimText.textContent = interim;
        interimBubble.classList.add('active');
        _showFeedback();
      }
    };
    liveRecog.onerror = function () { /* ignore */ };
    try { liveRecog.start(); } catch(e) { /* already started */ }
  }

  function _stopLiveTranscript() {
    if (liveRecog) {
      try { liveRecog.stop(); } catch(e) {}
      liveRecog = null;
    }
    interimBubble.classList.remove('active');
    interimText.textContent = '';
    if (!isPlayingChain) _hideFeedback();
  }

  // ── MediaRecorder (push-to-talk) ──────────────────────────────────────────
  function startRecording(evt) {
    if (evt) evt.preventDefault();
    if (!connected) { setStatus('Connect first.', true); return; }
    if (isRecording) return;

    // Resume AudioContext if suspended (autoplay policy)
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    var lang = langSelect.value;

    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function (stream) {
        _resetAudioQueue();
        audioChunks = [];
        isRecording = true;
        document.getElementById('btn-mic').classList.add('recording');
        setStatus('🎤 Recording… release to send.');

        // Start live transcript display alongside recording
        _startLiveTranscript(lang + '-' + lang.toUpperCase());

        var options = {};
        if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
          options = { mimeType: 'audio/webm;codecs=opus' };
        } else if (MediaRecorder.isTypeSupported('audio/webm')) {
          options = { mimeType: 'audio/webm' };
        } else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
          options = { mimeType: 'audio/ogg;codecs=opus' };
        }

        mediaRecorder = new MediaRecorder(stream, options);
        mediaRecorder.ondataavailable = function (e) {
          if (e.data && e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = function () {
          isRecording = false;
          document.getElementById('btn-mic').classList.remove('recording');
          stream.getTracks().forEach(function (t) { t.stop(); });
          var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          _sendAudio(blob);
        };
        mediaRecorder.start();
      })
      .catch(function (err) {
        setStatus('Mic access denied: ' + err.message, true);
        isRecording = false;
      });
  }

  function stopRecording(evt) {
    if (evt) evt.preventDefault();
    if (!isRecording || !mediaRecorder) return;
    _stopLiveTranscript();
    mediaRecorder.stop();
    setStatus('Processing…');
  }

  function _sendAudio(blob) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('Not connected.', true);
      return;
    }
    var reader = new FileReader();
    reader.onload = function () {
      var b64 = reader.result.split(',')[1];
      ws.send(JSON.stringify({ audio_b64: b64 }));
      showTyping('Stayforlong');
      setStatus('Waiting for response…');
    };
    reader.readAsDataURL(blob);
  }

  // ── Text input fallback ───────────────────────────────────────────────────
  window.onTextKey = function (evt) {
    if (evt.key === 'Enter') sendText();
  };

  window.sendText = function () {
    var input = document.getElementById('text-input');
    var text = input.value.trim();
    if (!text || !connected || !ws || ws.readyState !== WebSocket.OPEN) return;
    // Text goes through the text WS (re-use voice WS just sends message field)
    ws.send(JSON.stringify({ message: text }));
    appendMsg('user', text, null, 'text');
    input.value = '';
    showTyping('Stayforlong');
  };

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function appendMsg(role, content, agentName, channel) {
    var messages = document.getElementById('messages');
    var typing   = document.getElementById('typing');

    var wrapper = document.createElement('div');
    wrapper.className = 'msg ' + role;

    if (role === 'agent') {
      var lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = agentName || 'Assistant';
      wrapper.appendChild(lbl);
    } else {
      var lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.innerHTML = channel === 'voice' ? '🎤 You (voice)' : 'You';
      wrapper.appendChild(lbl);
    }

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    wrapper.appendChild(bubble);

    messages.insertBefore(wrapper, typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping(agentName) {
    var t = document.getElementById('typing');
    t.classList.add('visible');
    document.getElementById('messages').appendChild(t);
    document.getElementById('messages').scrollTop = 99999;
    if (agentName) agentLabel.textContent = agentName + '…';
  }

  function hideTyping() {
    document.getElementById('typing').classList.remove('visible');
  }

  function setStatus(msg, isErr) {
    statusMsg.textContent = msg;
    statusMsg.className = isErr ? 'err' : '';
  }

  // ── Expose to HTML ────────────────────────────────────────────────────────
  window.toggleConnect  = toggleConnect;
  window.startRecording = startRecording;
